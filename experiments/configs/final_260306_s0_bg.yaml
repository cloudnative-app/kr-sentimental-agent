# Final Experiment 260306 - S0+Budget: S0 + token budget control (계산량 통제 baseline).
# Base: cr_v2_final_s0_bg_con2; data: final_260306 (nikluge-sa-2022-dev.jsonl).
# Run via: python scripts/run_s0_budget_and_aggregate.py
# seeds=5, concurrency=5.
run_purpose: paper
run_id: final_260306_s0_bg
run_mode: proposed

pipeline:
  protocol_mode: conflict_review_v1
  conflict_mode: primary_secondary
  semantic_conflict_enabled: false
  stage1_mode: single_integrated
  enable_review: false
  enable_arbiter: false
  enable_memory: false
  compute_conflict_flags: true
  conflict_flags_mode: intra_output_only
  temperature: 0
  enable_stage2: false
  enable_validator: true
  enable_debate: false
  enable_debate_override: false

episodic_memory:
  condition: S0_budget

data:
  dataset_root: experiments/configs/datasets
  allowed_roots: ["experiments/configs/datasets"]
  input_format: csv
  train_file: final_260306/train.csv
  valid_file: final_260306/valid.csv
  text_column: text
  label_column: null
  target_column: null
  max_length: 192

eval:
  gold_valid_jsonl: final_260306/valid.gold.jsonl

backbone:
  provider: openai
  model: gpt-4.1-mini

data_roles:
  demo_pool: ["train"]
  tuning_pool: []
  report_set: ["valid"]
  blind_set: []
  report_sources: ["valid_file"]

demo:
  k: 0
  seed: 42
  enabled_for: []
  force_for_proposed: false
  hash_filter: false

budget_match:
  repeats_per_sample: 7
  aggregation: majority_vote
  tie_break: drop

experiment:
  repeat:
    mode: seed
    seeds: [42, 123, 456, 789, 1024]
  concurrency: 5
